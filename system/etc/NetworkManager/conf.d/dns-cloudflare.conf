# Force Cloudflare DNS on ALL connections to defeat Superonline DNS hijacking.
# The ISP sinkholes discord.com (and others) to a fake Superonline IPv6 address;
# forcing 1.1.1.1 returns the real Cloudflare IPs so the zapret DPI bypass can
# do its job. Global so it applies on every Wi-Fi/network automatically (the
# old per-connection nmcli approach broke every time we joined a new network).
[global-dns-domain-*]
servers=1.1.1.1,1.0.0.1,2606:4700:4700::1111,2606:4700:4700::1001
