# Donma yakalama: hard freeze'de journal'a yazilmamis son loglar kaybolur.
# SyncIntervalSec dusuk -> donma oncesi breadcrumb'lar en fazla ~1sn kayipla
# diske sabitlenir. SystemMaxUse tavan: kalici journal asla bu boyutu gecemez
# (disk dolma endisesi yok). Storage kalici.
[Journal]
Storage=persistent
SyncIntervalSec=1s
SystemMaxUse=500M
