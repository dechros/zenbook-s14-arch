wireplumber.settings.schema = {
  wireplumber.profiles = {
    main = {}
  }
}

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-5" }
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-6" }
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-7" }
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-31" }
    ]
    actions = {
      update-props = {
        node.disabled = true
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-2" }
    ]
    actions = {
      update-props = {
        node.description = "Built-in Speaker"
        node.nick = "Built-in Speaker"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_output.pci-0000_00_1f.3-platform-sof_sdw.pro-output-0" }
    ]
    actions = {
      update-props = {
        node.description = "3.5mm Jack Output"
        node.nick = "3.5mm Jack Output"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-10" }
    ]
    actions = {
      update-props = {
        node.description = "Built-in Microphone"
        node.nick = "Built-in Microphone"
      }
    }
  }
  {
    matches = [
      { node.name = "alsa_input.pci-0000_00_1f.3-platform-sof_sdw.pro-input-1" }
    ]
    actions = {
      update-props = {
        node.description = "3.5mm Jack Input"
        node.nick = "3.5mm Jack Input"
      }
    }
  }
]
