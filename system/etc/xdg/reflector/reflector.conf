# reflector.timer (haftalik) en hizli/guncel Arch mirror'larini otomatik secer.
# Boylece tek yavas mirror "Operation too slow" hatasi vermez.
# (CachyOS mirror'lari ayrica cachyos-rate-mirrors.timer ile otomatik siralanir.)
--save /etc/pacman.d/mirrorlist
--protocol https
--country Turkey,Germany,Netherlands,France,Bulgaria,Romania
--latest 20
--sort rate
